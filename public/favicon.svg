<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1525"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="route" x1="80" y1="120" x2="340" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="play" x1="310" y1="280" x2="420" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="playGlow">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle radial ambient -->
  <circle cx="280" cy="300" r="180" fill="#06b6d4" opacity="0.06"/>

  <!-- Route path — organic winding GPS trajectory -->
  <path
    d="M 100 160
       C 100 120, 150 105, 175 140
       C 200 175, 180 215, 210 240
       C 240 265, 270 235, 285 265
       C 300 295, 280 330, 305 350"
    stroke="url(#route)"
    stroke-width="20"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Start waypoint — outer ring + inner dot -->
  <circle cx="100" cy="160" r="16" fill="#06b6d4" opacity="0.25"/>
  <circle cx="100" cy="160" r="8" fill="#06b6d4"/>

  <!-- Mid waypoint -->
  <circle cx="210" cy="240" r="6" fill="#22d3ee" opacity="0.5"/>

  <!-- Play triangle at the route terminus -->
  <polygon
    points="320,295 320,385 410,340"
    fill="url(#play)"
    filter="url(#playGlow)"
  />
</svg>
