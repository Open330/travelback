<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0e1525"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="r" x1="5" y1="8" x2="22" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Route path -->
  <path
    d="M 6.5 10
       C 6.5 7.5, 9.5 6.5, 11 9
       C 12.5 11.5, 11 14, 13 15.5
       C 15 17, 17 15, 18 17
       C 19 19, 18 21.5, 19.5 22.5"
    stroke="url(#r)"
    stroke-width="2.4"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Start dot -->
  <circle cx="6.5" cy="10" r="2" fill="#06b6d4" opacity="0.35"/>
  <circle cx="6.5" cy="10" r="1.1" fill="#06b6d4"/>

  <!-- Play triangle -->
  <polygon points="20,20 20,25.5 26,22.75" fill="#06b6d4"/>
</svg>
